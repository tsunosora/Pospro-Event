<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e40af"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Booth / Tent shape -->
  <g transform="translate(96 120)">
    <!-- Tent roof -->
    <path d="M 0 80 L 160 0 L 320 80 L 320 100 L 0 100 Z" fill="#fff" opacity="0.95"/>
    <!-- Tent body -->
    <rect x="20" y="100" width="280" height="180" rx="8" fill="#fff" opacity="0.9"/>
    <!-- Door -->
    <path d="M 110 280 L 110 180 Q 160 160 210 180 L 210 280 Z" fill="url(#accent)"/>
    <!-- Window left -->
    <rect x="50" y="140" width="40" height="40" rx="4" fill="url(#bg)" opacity="0.7"/>
    <!-- Window right -->
    <rect x="230" y="140" width="40" height="40" rx="4" fill="url(#bg)" opacity="0.7"/>
    <!-- Flag pole -->
    <line x1="160" y1="0" x2="160" y2="-30" stroke="#fff" stroke-width="6" stroke-linecap="round"/>
    <!-- Flag -->
    <path d="M 160 -30 L 200 -22 L 160 -8 Z" fill="url(#accent)"/>
  </g>

  <!-- "P" letter monogram in bottom-right corner -->
  <text x="380" y="440" font-family="system-ui,-apple-system,sans-serif" font-size="120" font-weight="900" fill="#fff" text-anchor="middle">P</text>
</svg>
